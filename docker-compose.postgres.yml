services:
  postgres:
    image: timescale/timescaledb-ha:pg18-all-arm64
    container_name: poly-asian-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-polyuser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-polypassword}
      - POSTGRES_DB=${POSTGRES_DB:-polydata}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - poly-asian-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U polyuser -d polydata" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  poly-asian-network:
    name: poly-asian-network
    driver: bridge

volumes:
  postgres_data:
    name: poly-asian-postgres-data
