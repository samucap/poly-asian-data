version: '3.8'

services:
  app:
    container_name: poly-asian-data-app
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - ENV=${ENV:-production}
      - POLYMARKET_API_KEY=${POLYMARKET_API_KEY}
      - ODDS_API_KEY=${ODDS_API_KEY}
      - POSTGRES_URL=postgres://polyuser:polypassword@postgres:5432/polydata?sslmode=disable
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - poly-asian-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: poly-asian-postgres
    environment:
      - POSTGRES_USER=polyuser
      - POSTGRES_PASSWORD=polypassword
      - POSTGRES_DB=polydata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - poly-asian-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U polyuser -d polydata" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  poly-asian-network:
    name: poly-asian-network
    driver: bridge

volumes:
  postgres_data:
    name: poly-asian-postgres-data
